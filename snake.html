<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - נחש!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #header { color: #e94560; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px #e94560; }
        #score-board { color: #FFF; font-size: 18px; margin-bottom: 10px; display: flex; gap: 30px; direction: ltr; }
        #score-board span { color: #e94560; }
        canvas { border: 3px solid #e94560; border-radius: 8px; box-shadow: 0 0 20px #e9456044; background: #16213e; }
        #message { color: #e94560; font-size: 28px; margin-top: 12px; min-height: 36px; text-shadow: 0 0 10px #e94560; }
        #controls-hint { color: #888; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="header">SNAKE</div>
    <div id="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
        <div>Length: <span id="length">3</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message">Press any arrow to start!</div>
    <div id="controls-hint">Arrow keys / Swipe to move</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = 30;
const ROWS = 25;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, food, specialFood, score, bestScore, gameState, animFrame;
let speed, growCount;

bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
document.getElementById('best').textContent = bestScore;

function init() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [{ x: midX, y: midY }, { x: midX - 1, y: midY }, { x: midX - 2, y: midY }];
    dir = { x: 0, y: 0 };
    nextDir = { x: 0, y: 0 };
    score = 0;
    speed = 120;
    growCount = 0;
    gameState = 'waiting';
    specialFood = null;
    placeFood();
    updateUI();
    document.getElementById('message').textContent = 'Press any arrow to start!';
}

function placeFood() {
    let x, y;
    do {
        x = Math.floor(Math.random() * COLS);
        y = Math.floor(Math.random() * ROWS);
    } while (snake.some(s => s.x === x && s.y === y));
    food = { x, y, hue: Math.random() * 360 };

    // Chance for special food
    if (Math.random() < 0.15 && !specialFood) {
        let sx, sy;
        do {
            sx = Math.floor(Math.random() * COLS);
            sy = Math.floor(Math.random() * ROWS);
        } while (snake.some(s => s.x === sx && s.y === sy) || (sx === x && sy === y));
        specialFood = { x: sx, y: sy, timer: 80, points: 50 };
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('length').textContent = snake.length;
}

function update() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wrap around
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameState = 'gameover';
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('snakeBest', bestScore.toString());
            document.getElementById('best').textContent = bestScore;
        }
        return;
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        growCount += 2;
        if (speed > 60) speed -= 2;
        placeFood();
    } else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
        score += specialFood.points;
        growCount += 4;
        specialFood = null;
    }

    if (growCount > 0) {
        growCount--;
    } else {
        snake.pop();
    }

    if (specialFood) {
        specialFood.timer--;
        if (specialFood.timer <= 0) specialFood = null;
    }

    updateUI();
}

function drawGrid() {
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#1a2744';
    ctx.lineWidth = 0.5;
    for (let c = 0; c < COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
    }
    for (let r = 0; r < ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
    }
}

function drawSnake() {
    for (let i = 0; i < snake.length; i++) {
        const s = snake[i];
        const t = i / snake.length;
        const hue = 120 - t * 60; // Green to yellow gradient
        const size = i === 0 ? CELL - 2 : CELL - 3;
        const offset = i === 0 ? 1 : 1.5;

        ctx.fillStyle = `hsl(${hue}, 80%, ${55 - t * 15}%)`;
        ctx.shadowColor = i === 0 ? '#00FF88' : 'transparent';
        ctx.shadowBlur = i === 0 ? 10 : 0;

        // Rounded rectangle
        const x = s.x * CELL + offset;
        const y = s.y * CELL + offset;
        const r = 4;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + size - r, y);
        ctx.quadraticCurveTo(x + size, y, x + size, y + r);
        ctx.lineTo(x + size, y + size - r);
        ctx.quadraticCurveTo(x + size, y + size, x + size - r, y + size);
        ctx.lineTo(x + r, y + size);
        ctx.quadraticCurveTo(x, y + size, x, y + size - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Eyes on head
        if (i === 0) {
            ctx.fillStyle = '#FFF';
            let ex1, ey1, ex2, ey2;
            const cx = s.x * CELL + CELL / 2;
            const cy = s.y * CELL + CELL / 2;
            if (dir.x === 1) { ex1 = cx + 3; ey1 = cy - 4; ex2 = cx + 3; ey2 = cy + 4; }
            else if (dir.x === -1) { ex1 = cx - 3; ey1 = cy - 4; ex2 = cx - 3; ey2 = cy + 4; }
            else if (dir.y === -1) { ex1 = cx - 4; ey1 = cy - 3; ex2 = cx + 4; ey2 = cy - 3; }
            else { ex1 = cx - 4; ey1 = cy + 3; ex2 = cx + 4; ey2 = cy + 3; }
            ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(ex1 + dir.x, ey1 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2 + dir.x, ey2 + dir.y, 1.2, 0, Math.PI * 2); ctx.fill();
        }
    }
}

function drawFood() {
    animFrame = (animFrame || 0) + 1;
    const pulse = Math.sin(animFrame * 0.08) * 3;

    // Regular food
    ctx.fillStyle = `hsl(${food.hue}, 100%, 60%)`;
    ctx.shadowColor = `hsl(${food.hue}, 100%, 60%)`;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, 6 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Special food
    if (specialFood) {
        const blink = specialFood.timer < 20 && Math.floor(animFrame / 5) % 2;
        if (!blink) {
            ctx.fillStyle = '#FFD700';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            const sx = specialFood.x * CELL + CELL / 2;
            const sy = specialFood.y * CELL + CELL / 2;
            // Star shape
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const r = 7 + pulse;
                ctx[i === 0 ? 'moveTo' : 'lineTo'](sx + Math.cos(angle) * r, sy + Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
}

function draw() {
    drawGrid();
    drawFood();
    drawSnake();

    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
    }
}

let lastTick = 0;
function gameLoop(ts) {
    animFrame = (animFrame || 0) + 1;

    if (gameState === 'playing' && ts - lastTick >= speed) {
        lastTick = ts;
        update();
    }

    draw();

    const msgEl = document.getElementById('message');
    if (gameState === 'gameover') {
        msgEl.textContent = 'GAME OVER! SPACE to restart';
        msgEl.style.color = '#FF4444';
    } else if (gameState === 'playing') {
        msgEl.textContent = '';
    }

    requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(key)) {
        e.preventDefault();
        if (gameState === 'waiting') gameState = 'playing';
        if (gameState !== 'playing') return;

        switch (key) {
            case 'ArrowLeft': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;
            case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;
            case 'ArrowUp': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;
            case 'ArrowDown': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;
        }
    }
    if (key === ' ') {
        e.preventDefault();
        if (gameState === 'gameover') init();
    }
});

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (gameState === 'waiting') gameState = 'playing';
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dir.x === 0) nextDir = { x: dx > 0 ? 1 : -1, y: 0 };
    } else {
        if (dir.y === 0) nextDir = { x: 0, y: dy > 0 ? 1 : -1 };
    }
});

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
