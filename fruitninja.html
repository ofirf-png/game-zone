<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0a00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #header { color: #FF4500; font-size: 28px; margin-bottom: 8px; text-shadow: 0 0 10px #FF4500; }
        #score-board { color: #FFF; font-size: 18px; margin-bottom: 8px; display: flex; gap: 30px; direction: ltr; }
        #score-board span { color: #FF4500; }
        canvas { border: 3px solid #FF450044; border-radius: 8px; cursor: none; }
        #message { color: #FF4500; font-size: 28px; margin-top: 12px; min-height: 36px; text-shadow: 0 0 10px #FF4500; }
        #controls-hint { color: #888; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="header">FRUIT NINJA</div>
    <div id="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
        <div>Misses: <span id="misses">0</span> / 3</div>
        <div>Combo: <span id="combo">x1</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message">Swipe to slice fruits!</div>
    <div id="controls-hint">Click & drag to slice / Avoid bombs!</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 640;
canvas.height = 520;

const FRUITS = [
    { name: 'watermelon', color: '#2ECC40', inner: '#FF4136', size: 40, points: 10, emoji: null },
    { name: 'orange',     color: '#FF851B', inner: '#FFDC00', size: 32, points: 10, emoji: null },
    { name: 'apple',      color: '#FF4136', inner: '#FFFFAA', size: 30, points: 10, emoji: null },
    { name: 'kiwi',       color: '#7B5B3A', inner: '#2ECC40', size: 26, points: 15, emoji: null },
    { name: 'grape',      color: '#B10DC9', inner: '#DDA0DD', size: 24, points: 15, emoji: null },
    { name: 'banana',     color: '#FFDC00', inner: '#FFF8CC', size: 30, points: 10, emoji: null },
    { name: 'pineapple',  color: '#FFDC00', inner: '#FFE066', size: 35, points: 20, emoji: null },
    { name: 'strawberry', color: '#FF4136', inner: '#FF8888', size: 24, points: 15, emoji: null },
];

let objects = [];
let sliceTrail = [];
let particles = [];
let juiceSplats = [];
let halves = [];
let score, misses, bestScore, gameState, combo, comboTimer;
let spawnTimer, spawnInterval, difficulty;
let animFrame = 0;
let isSlicing = false;
let lastMouse = null;

bestScore = parseInt(localStorage.getItem('fruitNinjaBest') || '0');
document.getElementById('best').textContent = bestScore;

function init() {
    score = 0;
    misses = 0;
    combo = 0;
    comboTimer = 0;
    gameState = 'playing';
    spawnTimer = 0;
    spawnInterval = 80;
    difficulty = 1;
    objects = [];
    particles = [];
    sliceTrail = [];
    juiceSplats = [];
    halves = [];
    document.getElementById('message').textContent = '';
    updateUI();
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('misses').textContent = misses;
    document.getElementById('combo').textContent = combo > 1 ? `x${combo}` : 'x1';
}

function spawnFruit() {
    const isBomb = Math.random() < 0.12 + difficulty * 0.01;
    const fruit = isBomb ? null : FRUITS[Math.floor(Math.random() * FRUITS.length)];
    const x = 60 + Math.random() * (canvas.width - 120);
    const speed = 10 + Math.random() * 4 + difficulty * 0.5;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;

    objects.push({
        x, y: canvas.height + 40,
        dx: Math.cos(angle) * speed * 0.3,
        dy: -speed,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        fruit,
        isBomb,
        size: isBomb ? 30 : fruit.size,
        sliced: false,
        missed: false
    });
}

function spawnWave() {
    const count = 2 + Math.floor(Math.random() * 3) + Math.floor(difficulty / 3);
    for (let i = 0; i < count; i++) {
        setTimeout(() => spawnFruit(), i * (80 + Math.random() * 120));
    }
}

function sliceObject(obj, sliceAngle) {
    obj.sliced = true;
    const f = obj.fruit;

    if (obj.isBomb) {
        // Bomb explosion
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: obj.x, y: obj.y,
                dx: (Math.random() - 0.5) * 16,
                dy: (Math.random() - 0.5) * 16,
                life: 25 + Math.random() * 20,
                color: i % 3 === 0 ? '#FF4500' : i % 3 === 1 ? '#FFD700' : '#FF0000',
                size: 3 + Math.random() * 5
            });
        }
        misses = 3; // Instant game over
        return;
    }

    // Juice particles
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: obj.x, y: obj.y,
            dx: (Math.random() - 0.5) * 12,
            dy: (Math.random() - 0.5) * 12 - 3,
            life: 20 + Math.random() * 15,
            color: f.inner,
            size: 2 + Math.random() * 4
        });
    }

    // Juice splat on background
    juiceSplats.push({
        x: obj.x + (Math.random() - 0.5) * 40,
        y: obj.y + (Math.random() - 0.5) * 40,
        color: f.inner,
        size: obj.size * 0.8 + Math.random() * 20,
        alpha: 0.4
    });

    // Two halves
    const perpX = Math.cos(sliceAngle + Math.PI / 2);
    const perpY = Math.sin(sliceAngle + Math.PI / 2);
    for (let side = -1; side <= 1; side += 2) {
        halves.push({
            x: obj.x + perpX * side * 5,
            y: obj.y + perpY * side * 5,
            dx: perpX * side * 3 + obj.dx,
            dy: perpY * side * 3 + obj.dy,
            rotation: obj.rotation,
            rotSpeed: side * 0.1,
            fruit: f,
            size: obj.size,
            side,
            sliceAngle,
            life: 60
        });
    }

    // Score
    combo++;
    comboTimer = 30;
    const points = f.points * Math.min(combo, 5);
    score += points;
}

function update() {
    animFrame++;
    if (gameState !== 'playing') return;

    // Spawn
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnWave();
        spawnInterval = Math.max(40, 80 - difficulty * 3);
        difficulty += 0.15;
    }

    // Combo timer
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0;
    }

    // Objects
    for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        obj.x += obj.dx;
        obj.y += obj.dy;
        obj.dy += 0.28; // Gravity
        obj.rotation += obj.rotSpeed;

        if (obj.y > canvas.height + 60 && !obj.sliced) {
            if (!obj.isBomb && !obj.missed) {
                obj.missed = true;
                misses++;
            }
            objects.splice(i, 1);
        } else if (obj.sliced || obj.y > canvas.height + 100) {
            objects.splice(i, 1);
        }
    }

    // Halves
    for (let i = halves.length - 1; i >= 0; i--) {
        const h = halves[i];
        h.x += h.dx;
        h.y += h.dy;
        h.dy += 0.3;
        h.rotation += h.rotSpeed;
        h.life--;
        if (h.life <= 0 || h.y > canvas.height + 80) halves.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        p.dy += 0.2;
        p.dx *= 0.98;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Splats fade
    for (let i = juiceSplats.length - 1; i >= 0; i--) {
        juiceSplats[i].alpha -= 0.002;
        if (juiceSplats[i].alpha <= 0) juiceSplats.splice(i, 1);
    }

    // Slice trail decay
    for (let i = sliceTrail.length - 1; i >= 0; i--) {
        sliceTrail[i].life--;
        if (sliceTrail[i].life <= 0) sliceTrail.splice(i, 1);
    }

    // Check game over
    if (misses >= 3) {
        gameState = 'gameover';
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('fruitNinjaBest', bestScore.toString());
            document.getElementById('best').textContent = bestScore;
        }
    }

    updateUI();
}

function drawFruit(x, y, obj) {
    const f = obj.fruit;
    const s = obj.size;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(obj.rotation);

    if (obj.isBomb) {
        // Bomb body
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(0, 0, s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2);
        ctx.fill();
        // Fuse
        ctx.strokeStyle = '#AA8844';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.quadraticCurveTo(8, -s - 12, 4, -s - 18);
        ctx.stroke();
        // Spark
        const sparkSize = 3 + Math.sin(animFrame * 0.5) * 2;
        ctx.fillStyle = '#FF4500';
        ctx.shadowColor = '#FF4500';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(4, -s - 18, sparkSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Skull
        ctx.fillStyle = '#888';
        ctx.font = `${s * 0.8}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('X', 0, s * 0.3);
    } else {
        // Fruit body
        ctx.fillStyle = f.color;
        ctx.shadowColor = f.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();

        if (f.name === 'banana') {
            ctx.ellipse(0, 0, s * 0.5, s, 0.3, 0, Math.PI * 2);
        } else if (f.name === 'pineapple') {
            ctx.ellipse(0, 4, s * 0.7, s, 0, 0, Math.PI * 2);
            ctx.fill();
            // Leaves
            ctx.fillStyle = '#2ECC40';
            ctx.beginPath();
            ctx.ellipse(0, -s + 2, s * 0.3, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-6, -s + 6, s * 0.2, 10, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(6, -s + 6, s * 0.2, 10, 0.3, 0, Math.PI * 2);
        } else if (f.name === 'strawberry') {
            ctx.moveTo(0, -s * 0.7);
            ctx.bezierCurveTo(s, -s * 0.5, s * 0.8, s * 0.8, 0, s);
            ctx.bezierCurveTo(-s * 0.8, s * 0.8, -s, -s * 0.5, 0, -s * 0.7);
        } else {
            ctx.arc(0, 0, s, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(-s * 0.25, -s * 0.3, s * 0.25, s * 0.15, -0.4, 0, Math.PI * 2);
        ctx.fill();

        // Leaf/stem for apple
        if (f.name === 'apple') {
            ctx.fillStyle = '#2ECC40';
            ctx.beginPath();
            ctx.ellipse(4, -s + 2, 6, 4, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -s + 3);
            ctx.lineTo(0, -s - 5);
            ctx.stroke();
        }
    }
    ctx.restore();
}

function drawHalf(h) {
    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.rotate(h.rotation);

    // Clip to show half
    ctx.beginPath();
    if (h.side === -1) {
        ctx.rect(-h.size - 5, -h.size - 5, h.size + 5, (h.size + 5) * 2);
    } else {
        ctx.rect(0, -h.size - 5, h.size + 5, (h.size + 5) * 2);
    }
    ctx.clip();

    // Outer
    ctx.fillStyle = h.fruit.color;
    ctx.beginPath();
    ctx.arc(0, 0, h.size, 0, Math.PI * 2);
    ctx.fill();

    // Inner (flesh)
    ctx.fillStyle = h.fruit.inner;
    ctx.beginPath();
    ctx.arc(0, 0, h.size * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Seeds for some fruits
    if (h.fruit.name === 'watermelon') {
        ctx.fillStyle = '#333';
        for (let i = 0; i < 5; i++) {
            const sx = (Math.random() - 0.5) * h.size;
            const sy = (Math.random() - 0.5) * h.size;
            ctx.beginPath();
            ctx.ellipse(sx, sy, 2, 3, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.restore();
}

function draw() {
    // Background with wooden texture feel
    const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, '#2a1506');
    bgGrad.addColorStop(0.5, '#1a0a00');
    bgGrad.addColorStop(1, '#0a0500');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Wood grain lines
    ctx.strokeStyle = 'rgba(60,30,10,0.3)';
    ctx.lineWidth = 1;
    for (let y = 0; y < canvas.height; y += 20) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.sin(y * 0.05) * 5);
        for (let x = 0; x < canvas.width; x += 10) {
            ctx.lineTo(x, y + Math.sin((x + y) * 0.03) * 3);
        }
        ctx.stroke();
    }

    // Juice splats
    for (const splat of juiceSplats) {
        ctx.globalAlpha = splat.alpha;
        ctx.fillStyle = splat.color;
        ctx.beginPath();
        ctx.arc(splat.x, splat.y, splat.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Halves
    for (const h of halves) {
        ctx.globalAlpha = Math.min(1, h.life / 20);
        drawHalf(h);
    }
    ctx.globalAlpha = 1;

    // Fruits
    for (const obj of objects) {
        if (!obj.sliced) drawFruit(obj.x, obj.y, obj);
    }

    // Slice trail
    if (sliceTrail.length >= 2) {
        for (let i = 1; i < sliceTrail.length; i++) {
            const t = sliceTrail[i];
            const prev = sliceTrail[i - 1];
            const alpha = t.life / 12;
            ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
            ctx.lineWidth = 3 * alpha;
            ctx.shadowColor = '#FFF';
            ctx.shadowBlur = 10 * alpha;
            ctx.beginPath();
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(t.x, t.y);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / 40), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Miss indicators (X marks)
    for (let i = 0; i < 3; i++) {
        const mx = 20 + i * 35;
        const my = canvas.height - 25;
        if (i < misses) {
            ctx.fillStyle = '#FF0000';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('X', mx, my);
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mx, my - 7, 10, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // Combo display
    if (combo > 1) {
        ctx.fillStyle = '#FFD700';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 10;
        ctx.font = `bold ${24 + combo * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(`${combo}x COMBO!`, canvas.width / 2, 50);
        ctx.shadowBlur = 0;
    }

    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FF4500';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillStyle = '#AAA';
        ctx.font = '18px Arial';
        ctx.fillText('Click to play again', canvas.width / 2, canvas.height / 2 + 55);
    }
}

function checkSlice(x, y) {
    if (!lastMouse) return;
    const sliceAngle = Math.atan2(y - lastMouse.y, x - lastMouse.x);
    const sliceDist = Math.hypot(x - lastMouse.x, y - lastMouse.y);
    if (sliceDist < 5) return;

    for (const obj of objects) {
        if (obj.sliced) continue;
        const dist = Math.hypot(obj.x - x, obj.y - y);
        if (dist < obj.size + 10) {
            sliceObject(obj, sliceAngle);
        }
    }
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
        x: (touch.clientX - rect.left) * (canvas.width / rect.width),
        y: (touch.clientY - rect.top) * (canvas.height / rect.height)
    };
}

function onStart(e) {
    e.preventDefault();
    if (gameState === 'gameover') { init(); return; }
    isSlicing = true;
    const pos = getPos(e);
    lastMouse = pos;
    sliceTrail.push({ x: pos.x, y: pos.y, life: 12 });
}

function onMove(e) {
    e.preventDefault();
    if (!isSlicing || gameState !== 'playing') return;
    const pos = getPos(e);
    sliceTrail.push({ x: pos.x, y: pos.y, life: 12 });
    checkSlice(pos.x, pos.y);
    lastMouse = pos;
}

function onEnd(e) {
    e.preventDefault();
    isSlicing = false;
    lastMouse = null;
}

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd, { passive: false });

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
