<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - שבירת לבנים!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f23;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #header { color: #FF6B35; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px #FF6B35; }
        #score-board { color: #FFF; font-size: 18px; margin-bottom: 10px; display: flex; gap: 30px; direction: ltr; }
        #score-board span { color: #FF6B35; }
        canvas { border: 3px solid #FF6B35; border-radius: 8px; box-shadow: 0 0 20px #FF6B3544; cursor: none; }
        #message { color: #FF6B35; font-size: 28px; margin-top: 12px; min-height: 36px; text-shadow: 0 0 10px #FF6B35; }
        #controls-hint { color: #888; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="header">BREAKOUT</div>
    <div id="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message">Click to launch!</div>
    <div id="controls-hint">Mouse / Touch to move paddle</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 640;
canvas.height = 480;

const PADDLE_W = 90, PADDLE_H = 14, BALL_R = 6;
const BRICK_ROWS = 8, BRICK_COLS = 12, BRICK_W = 48, BRICK_H = 18, BRICK_PAD = 4;
const BRICK_OFFSET_X = (canvas.width - BRICK_COLS * (BRICK_W + BRICK_PAD)) / 2;
const BRICK_OFFSET_Y = 50;

const ROW_COLORS = ['#FF0055', '#FF4400', '#FF8800', '#FFBB00', '#88DD00', '#00CC88', '#0088FF', '#8844FF'];

let paddle, ball, bricks, score, lives, level, gameState, particles, powerups, animFrame;

function init() {
    score = 0; lives = 3; level = 1;
    gameState = 'ready';
    particles = [];
    powerups = [];
    document.getElementById('message').textContent = 'Click to launch!';
    document.getElementById('message').style.color = '#FF6B35';
    setupLevel();
}

function setupLevel() {
    paddle = { x: canvas.width / 2 - PADDLE_W / 2, y: canvas.height - 35, w: PADDLE_W };
    ball = { x: canvas.width / 2, y: paddle.y - BALL_R - 1, dx: 0, dy: 0, stuck: true, speed: 4 + level * 0.3 };
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            const hp = r < 2 ? 2 : 1;
            bricks.push({
                x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD),
                y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD),
                w: BRICK_W, h: BRICK_H,
                alive: true, hp, maxHp: hp,
                color: ROW_COLORS[r],
                points: (BRICK_ROWS - r) * 10
            });
        }
    }
    powerups = [];
    gameState = 'ready';
    updateUI();
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function launchBall() {
    if (!ball.stuck) return;
    ball.stuck = false;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    ball.dx = Math.cos(angle) * ball.speed;
    ball.dy = Math.sin(angle) * ball.speed;
    gameState = 'playing';
    document.getElementById('message').textContent = '';
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            life: 30 + Math.random() * 20,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

function update() {
    if (ball.stuck) {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - BALL_R - 1;
        return;
    }

    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collisions
    if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
    if (ball.x + BALL_R >= canvas.width) { ball.x = canvas.width - BALL_R; ball.dx = -Math.abs(ball.dx); }
    if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); }

    // Bottom - lose life
    if (ball.y + BALL_R >= canvas.height) {
        lives--;
        updateUI();
        if (lives <= 0) {
            gameState = 'gameover';
        } else {
            ball.stuck = true;
            ball.x = paddle.x + paddle.w / 2;
            ball.y = paddle.y - BALL_R - 1;
            gameState = 'ready';
            document.getElementById('message').textContent = 'Click to launch!';
        }
        return;
    }

    // Paddle collision
    if (ball.dy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + PADDLE_H + 4 &&
        ball.x >= paddle.x - 2 &&
        ball.x <= paddle.x + paddle.w + 2) {
        const hitPos = (ball.x - paddle.x) / paddle.w; // 0 to 1
        const angle = -Math.PI / 2 + (hitPos - 0.5) * 1.2; // -120 to -60 degrees
        const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        ball.dx = Math.cos(angle) * speed;
        ball.dy = Math.sin(angle) * speed;
        ball.y = paddle.y - BALL_R - 1;
        spawnParticles(ball.x, ball.y, '#FFF', 5);
    }

    // Brick collision
    let anyAlive = false;
    for (const brick of bricks) {
        if (!brick.alive) continue;
        anyAlive = true;

        if (ball.x + BALL_R > brick.x &&
            ball.x - BALL_R < brick.x + brick.w &&
            ball.y + BALL_R > brick.y &&
            ball.y - BALL_R < brick.y + brick.h) {

            brick.hp--;
            if (brick.hp <= 0) {
                brick.alive = false;
                score += brick.points;
                spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 12);

                // Power-up drop chance
                if (Math.random() < 0.12) {
                    const types = ['wide', 'life', 'fast'];
                    powerups.push({
                        x: brick.x + brick.w / 2,
                        y: brick.y + brick.h / 2,
                        type: types[Math.floor(Math.random() * types.length)],
                        dy: 2
                    });
                }
            } else {
                spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, '#FFF', 5);
            }

            // Determine bounce direction
            const overlapLeft = (ball.x + BALL_R) - brick.x;
            const overlapRight = (brick.x + brick.w) - (ball.x - BALL_R);
            const overlapTop = (ball.y + BALL_R) - brick.y;
            const overlapBottom = (brick.y + brick.h) - (ball.y - BALL_R);
            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapTop || minOverlap === overlapBottom) ball.dy = -ball.dy;
            else ball.dx = -ball.dx;

            updateUI();
            break;
        }
    }

    if (!anyAlive) {
        gameState = 'win';
    }

    // Powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.dy;
        if (p.y > canvas.height) { powerups.splice(i, 1); continue; }
        if (p.y + 10 >= paddle.y && p.x >= paddle.x && p.x <= paddle.x + paddle.w) {
            switch (p.type) {
                case 'wide': paddle.w = Math.min(160, paddle.w + 20); break;
                case 'life': lives++; break;
                case 'fast': ball.speed += 0.5; break;
            }
            spawnParticles(p.x, p.y, '#FFD700', 8);
            powerups.splice(i, 1);
            updateUI();
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        p.dy += 0.1;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bricks
    for (const brick of bricks) {
        if (!brick.alive) continue;
        const alpha = brick.hp / brick.maxHp;
        ctx.fillStyle = brick.color;
        ctx.globalAlpha = 0.5 + alpha * 0.5;

        // Rounded brick
        const r = 3;
        ctx.beginPath();
        ctx.moveTo(brick.x + r, brick.y);
        ctx.lineTo(brick.x + brick.w - r, brick.y);
        ctx.quadraticCurveTo(brick.x + brick.w, brick.y, brick.x + brick.w, brick.y + r);
        ctx.lineTo(brick.x + brick.w, brick.y + brick.h - r);
        ctx.quadraticCurveTo(brick.x + brick.w, brick.y + brick.h, brick.x + brick.w - r, brick.y + brick.h);
        ctx.lineTo(brick.x + r, brick.y + brick.h);
        ctx.quadraticCurveTo(brick.x, brick.y + brick.h, brick.x, brick.y + brick.h - r);
        ctx.lineTo(brick.x, brick.y + r);
        ctx.quadraticCurveTo(brick.x, brick.y, brick.x + r, brick.y);
        ctx.fill();

        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(brick.x + 2, brick.y + 2, brick.w - 4, brick.h / 3);
        ctx.globalAlpha = 1;
    }

    // Paddle
    const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
    grad.addColorStop(0, '#FF8855');
    grad.addColorStop(1, '#FF6B35');
    ctx.fillStyle = grad;
    ctx.shadowColor = '#FF6B35';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    const pr = PADDLE_H / 2;
    ctx.moveTo(paddle.x + pr, paddle.y);
    ctx.lineTo(paddle.x + paddle.w - pr, paddle.y);
    ctx.arc(paddle.x + paddle.w - pr, paddle.y + pr, pr, -Math.PI / 2, Math.PI / 2);
    ctx.lineTo(paddle.x + pr, paddle.y + PADDLE_H);
    ctx.arc(paddle.x + pr, paddle.y + pr, pr, Math.PI / 2, -Math.PI / 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball
    ctx.fillStyle = '#FFF';
    ctx.shadowColor = '#FFF';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball trail
    if (!ball.stuck) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(ball.x - ball.dx * 0.5, ball.y - ball.dy * 0.5, BALL_R * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(ball.x - ball.dx, ball.y - ball.dy, BALL_R * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / 50), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Powerups
    animFrame = (animFrame || 0) + 1;
    for (const p of powerups) {
        const colors = { wide: '#00FFAA', life: '#FF4488', fast: '#FFDD00' };
        const labels = { wide: 'W', life: '+', fast: 'F' };
        ctx.fillStyle = colors[p.type];
        ctx.shadowColor = colors[p.type];
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(labels[p.type], p.x, p.y + 4);
    }

    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
    } else if (gameState === 'win') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00FF88';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, canvas.height / 2);
    }
}

function gameLoop() {
    if (gameState === 'playing') update();
    else if (gameState === 'ready') update(); // just to keep ball on paddle
    draw();
    requestAnimationFrame(gameLoop);
}

// Mouse control
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
});

canvas.addEventListener('click', () => {
    if (gameState === 'ready') launchBall();
    else if (gameState === 'gameover') init();
    else if (gameState === 'win') { level++; setupLevel(); gameState = 'ready'; document.getElementById('message').textContent = 'Click to launch!'; }
});

// Touch control
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w / 2;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
    if (gameState === 'ready') launchBall();
    else if (gameState === 'gameover') init();
    else if (gameState === 'win') { level++; setupLevel(); }
});

document.addEventListener('keydown', (e) => {
    if (e.key === ' ') {
        e.preventDefault();
        if (gameState === 'ready') launchBall();
        else if (gameState === 'gameover') init();
        else if (gameState === 'win') { level++; setupLevel(); }
    }
});

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
