<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Crush!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a0533, #2d1b69, #1a0533);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #header {
            font-size: 36px; margin-bottom: 8px; font-weight: bold;
            background: linear-gradient(90deg, #FF6B9D, #FFD93D, #6BCB77, #4D96FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #score-board { color: #FFF; font-size: 18px; margin-bottom: 10px; display: flex; gap: 30px; direction: ltr; }
        #score-board span { color: #FFD93D; }
        canvas { border: 3px solid rgba(255,255,255,0.2); border-radius: 12px; box-shadow: 0 0 30px rgba(100,50,200,0.4); cursor: pointer; }
        #message { color: #FFD93D; font-size: 28px; margin-top: 12px; min-height: 36px; text-shadow: 0 0 10px #FFD93D; }
        #controls-hint { color: #888; font-size: 14px; margin-top: 8px; }
        .combo-text {
            position: fixed; pointer-events: none; font-weight: bold;
            font-size: 32px; color: #FFD93D; text-shadow: 0 0 10px #FFD93D;
            animation: comboAnim 1s ease-out forwards; z-index: 10;
        }
        @keyframes comboAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            50% { transform: scale(1.3) translateY(-20px); opacity: 1; }
            100% { transform: scale(1) translateY(-60px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="header">CANDY CRUSH</div>
    <div id="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Moves: <span id="moves">30</span></div>
        <div>Target: <span id="target">3000</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message"></div>
    <div id="controls-hint">Click two adjacent candies to swap them!</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const ROWS = 8, COLS = 8, CELL = 64, PAD = 4;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const CANDY_COLORS = ['#FF4D6D', '#FFD93D', '#6BCB77', '#4D96FF', '#C77DFF', '#FF8C42'];
const CANDY_SHAPES = ['circle', 'diamond', 'square', 'triangle', 'star', 'heart'];

let grid, selected, score, movesLeft, level, targetScore, gameState;
let animating = false;
let animations = [];
let particles = [];
let comboCount = 0;
let animFrame = 0;
let hoverCell = null;

function init() {
    score = 0;
    level = 1;
    movesLeft = 30;
    targetScore = 3000;
    gameState = 'playing';
    selected = null;
    document.getElementById('message').textContent = '';
    generateGrid();
    updateUI();
}

function generateGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
            grid[r][c] = randomCandy(r, c);
        }
    }
    // Remove initial matches
    while (findMatches().length > 0) {
        for (let r = 0; r < ROWS; r++)
            for (let c = 0; c < COLS; c++)
                if (isPartOfMatch(r, c)) grid[r][c] = randomCandy(r, c);
    }
}

function randomCandy(r, c) {
    // Avoid creating matches during generation
    let type;
    let attempts = 0;
    do {
        type = Math.floor(Math.random() * CANDY_COLORS.length);
        attempts++;
    } while (attempts < 20 && wouldMatch(r, c, type));
    return { type, scale: 1, offsetX: 0, offsetY: 0, alpha: 1 };
}

function wouldMatch(r, c, type) {
    // Check horizontal
    if (c >= 2 && grid[r][c-1] && grid[r][c-2] && grid[r][c-1].type === type && grid[r][c-2].type === type) return true;
    // Check vertical
    if (r >= 2 && grid[r-1] && grid[r-2] && grid[r-1][c] && grid[r-2][c] && grid[r-1][c].type === type && grid[r-2][c].type === type) return true;
    return false;
}

function isPartOfMatch(r, c) {
    const matches = findMatches();
    return matches.some(m => m.some(([mr, mc]) => mr === r && mc === c));
}

function findMatches() {
    const matches = [];
    // Horizontal
    for (let r = 0; r < ROWS; r++) {
        let c = 0;
        while (c < COLS) {
            const type = grid[r][c] ? grid[r][c].type : -1;
            let end = c + 1;
            while (end < COLS && grid[r][end] && grid[r][end].type === type) end++;
            if (end - c >= 3) {
                const match = [];
                for (let i = c; i < end; i++) match.push([r, i]);
                matches.push(match);
            }
            c = end;
        }
    }
    // Vertical
    for (let c = 0; c < COLS; c++) {
        let r = 0;
        while (r < ROWS) {
            const type = grid[r][c] ? grid[r][c].type : -1;
            let end = r + 1;
            while (end < ROWS && grid[end][c] && grid[end][c].type === type) end++;
            if (end - r >= 3) {
                const match = [];
                for (let i = r; i < end; i++) match.push([i, c]);
                matches.push(match);
            }
            r = end;
        }
    }
    return matches;
}

function removeMatches(matches) {
    const removed = new Set();
    let points = 0;
    for (const match of matches) {
        const matchPoints = match.length >= 5 ? 150 : match.length >= 4 ? 80 : 30;
        points += matchPoints * (comboCount + 1);
        for (const [r, c] of match) {
            const key = r * COLS + c;
            if (!removed.has(key)) {
                removed.add(key);
                spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, CANDY_COLORS[grid[r][c].type], 8);
                grid[r][c] = null;
            }
        }
    }
    score += points;
    if (points > 100) showCombo(comboCount);
}

function showCombo(combo) {
    if (combo < 1) return;
    const text = combo >= 3 ? 'AMAZING!' : combo >= 2 ? 'GREAT!' : 'NICE!';
    const el = document.createElement('div');
    el.className = 'combo-text';
    el.textContent = `${text} x${combo + 1}`;
    el.style.left = (canvas.getBoundingClientRect().left + canvas.width / 2 - 60) + 'px';
    el.style.top = (canvas.getBoundingClientRect().top + canvas.height / 2) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function dropCandies() {
    let dropped = false;
    for (let c = 0; c < COLS; c++) {
        for (let r = ROWS - 1; r >= 0; r--) {
            if (grid[r][c] === null) {
                // Find candy above
                let above = r - 1;
                while (above >= 0 && grid[above][c] === null) above--;
                if (above >= 0) {
                    grid[r][c] = grid[above][c];
                    grid[above][c] = null;
                    dropped = true;
                }
            }
        }
        // Fill top with new candies
        for (let r = 0; r < ROWS; r++) {
            if (grid[r][c] === null) {
                grid[r][c] = { type: Math.floor(Math.random() * CANDY_COLORS.length), scale: 1, offsetX: 0, offsetY: 0, alpha: 1 };
                dropped = true;
            }
        }
    }
    return dropped;
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            dx: (Math.random() - 0.5) * 10,
            dy: (Math.random() - 0.5) * 10 - 3,
            life: 20 + Math.random() * 15,
            color, size: 3 + Math.random() * 4
        });
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('moves').textContent = movesLeft;
    document.getElementById('target').textContent = targetScore;
    document.getElementById('level').textContent = level;
}

function swap(r1, c1, r2, c2) {
    const temp = grid[r1][c1];
    grid[r1][c1] = grid[r2][c2];
    grid[r2][c2] = temp;
}

function isAdjacent(r1, c1, r2, c2) {
    return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

async function doSwap(r1, c1, r2, c2) {
    if (animating) return;
    animating = true;

    swap(r1, c1, r2, c2);
    const matches = findMatches();

    if (matches.length === 0) {
        // Swap back
        swap(r1, c1, r2, c2);
        animating = false;
        return;
    }

    movesLeft--;
    comboCount = 0;

    // Process cascade
    while (true) {
        const m = findMatches();
        if (m.length === 0) break;
        removeMatches(m);
        updateUI();
        await sleep(200);
        dropCandies();
        await sleep(150);
        comboCount++;
    }

    // Check game state
    if (score >= targetScore) {
        gameState = 'win';
        document.getElementById('message').textContent = 'Level Complete! Click for next level';
        document.getElementById('message').style.color = '#6BCB77';
    } else if (movesLeft <= 0) {
        gameState = 'gameover';
        document.getElementById('message').textContent = 'Game Over! Click to restart';
        document.getElementById('message').style.color = '#FF4D6D';
    }

    selected = null;
    animating = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function drawCandy(x, y, type, size, highlight) {
    const color = CANDY_COLORS[type];
    const cx = x + CELL / 2;
    const cy = y + CELL / 2;
    const r = (CELL / 2 - PAD) * size;

    if (highlight) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;

    const shape = CANDY_SHAPES[type];
    ctx.beginPath();
    switch (shape) {
        case 'circle':
            ctx.arc(cx, cy, r * 0.85, 0, Math.PI * 2);
            break;
        case 'diamond':
            ctx.moveTo(cx, cy - r * 0.9);
            ctx.lineTo(cx + r * 0.7, cy);
            ctx.lineTo(cx, cy + r * 0.9);
            ctx.lineTo(cx - r * 0.7, cy);
            break;
        case 'square':
            roundedRect(cx - r * 0.7, cy - r * 0.7, r * 1.4, r * 1.4, 6);
            break;
        case 'triangle':
            ctx.moveTo(cx, cy - r * 0.9);
            ctx.lineTo(cx + r * 0.85, cy + r * 0.65);
            ctx.lineTo(cx - r * 0.85, cy + r * 0.65);
            break;
        case 'star':
            for (let i = 0; i < 5; i++) {
                const angle = -Math.PI / 2 + (i * 2 * Math.PI / 5);
                const outerX = cx + Math.cos(angle) * r * 0.85;
                const outerY = cy + Math.sin(angle) * r * 0.85;
                const innerAngle = angle + Math.PI / 5;
                const innerX = cx + Math.cos(innerAngle) * r * 0.4;
                const innerY = cy + Math.sin(innerAngle) * r * 0.4;
                if (i === 0) ctx.moveTo(outerX, outerY);
                else ctx.lineTo(outerX, outerY);
                ctx.lineTo(innerX, innerY);
            }
            break;
        case 'heart':
            ctx.moveTo(cx, cy + r * 0.6);
            ctx.bezierCurveTo(cx - r, cy, cx - r, cy - r * 0.8, cx, cy - r * 0.35);
            ctx.bezierCurveTo(cx + r, cy - r * 0.8, cx + r, cy, cx, cy + r * 0.6);
            break;
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx - r * 0.2, cy - r * 0.25, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
    ctx.fill();
}

function roundedRect(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
}

function draw() {
    animFrame++;

    // Background
    ctx.fillStyle = '#1a0533';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid bg
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.02)';
            ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
        }
    }

    // Candies
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!grid[r][c]) continue;
            const candy = grid[r][c];
            const isSelected = selected && selected.r === r && selected.c === c;
            const isHover = hoverCell && hoverCell.r === r && hoverCell.c === c;
            const pulse = isSelected ? 0.9 + Math.sin(animFrame * 0.15) * 0.1 : 1;
            const x = c * CELL + candy.offsetX;
            const y = r * CELL + candy.offsetY;
            drawCandy(x, y, candy.type, pulse * candy.scale, isSelected || isHover);
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        p.dy += 0.3;
        p.life--;
        ctx.globalAlpha = p.life / 35;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / 35), 0, Math.PI * 2);
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;

    // Game over overlay
    if (gameState === 'gameover' || gameState === 'win') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

function gameLoop() {
    draw();
    requestAnimationFrame(gameLoop);
}

function getCellFromPos(mx, my) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    const x = (mx - rect.left) * sx;
    const y = (my - rect.top) * sy;
    const c = Math.floor(x / CELL);
    const r = Math.floor(y / CELL);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return { r, c };
    return null;
}

canvas.addEventListener('mousemove', (e) => {
    hoverCell = getCellFromPos(e.clientX, e.clientY);
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; });

canvas.addEventListener('click', (e) => {
    if (gameState === 'win') {
        level++;
        movesLeft = 30;
        targetScore += 2000;
        gameState = 'playing';
        document.getElementById('message').textContent = '';
        generateGrid();
        updateUI();
        return;
    }
    if (gameState === 'gameover') { init(); return; }
    if (animating || gameState !== 'playing') return;

    const cell = getCellFromPos(e.clientX, e.clientY);
    if (!cell) return;

    if (!selected) {
        selected = cell;
    } else {
        if (selected.r === cell.r && selected.c === cell.c) {
            selected = null;
        } else if (isAdjacent(selected.r, selected.c, cell.r, cell.c)) {
            doSwap(selected.r, selected.c, cell.r, cell.c);
        } else {
            selected = cell;
        }
    }
});

// Touch support
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const cell = getCellFromPos(e.touches[0].clientX, e.touches[0].clientY);
    if (!cell) return;
    touchStart = { ...cell, sx: e.touches[0].clientX, sy: e.touches[0].clientY };

    if (gameState === 'win') {
        level++; movesLeft = 30; targetScore += 2000;
        gameState = 'playing'; document.getElementById('message').textContent = '';
        generateGrid(); updateUI(); return;
    }
    if (gameState === 'gameover') { init(); return; }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!touchStart || animating || gameState !== 'playing') { touchStart = null; return; }

    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - touchStart.sx;
    const dy = endY - touchStart.sy;

    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
        // Tap
        if (!selected) {
            selected = { r: touchStart.r, c: touchStart.c };
        } else if (isAdjacent(selected.r, selected.c, touchStart.r, touchStart.c)) {
            doSwap(selected.r, selected.c, touchStart.r, touchStart.c);
        } else {
            selected = { r: touchStart.r, c: touchStart.c };
        }
    } else {
        // Swipe
        let dr = 0, dc = 0;
        if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
        else dr = dy > 0 ? 1 : -1;
        const nr = touchStart.r + dr, nc = touchStart.c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            selected = null;
            doSwap(touchStart.r, touchStart.c, nr, nc);
        }
    }
    touchStart = null;
}, { passive: false });

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
