<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - פולשי חלל!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000011;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #header { color: #00FF41; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px #00FF41; letter-spacing: 4px; }
        #score-board { color: #FFF; font-size: 18px; margin-bottom: 10px; display: flex; gap: 30px; direction: ltr; }
        #score-board span { color: #00FF41; }
        canvas { border: 2px solid #00FF41; border-radius: 4px; box-shadow: 0 0 20px #00FF4144; max-width: 100vw; max-height: 70vh; width: auto; height: auto; }
        #message { color: #00FF41; font-size: 28px; margin-top: 12px; min-height: 36px; text-shadow: 0 0 10px #00FF41; }
        #controls-hint { color: #888; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="header">SPACE INVADERS</div>
    <div id="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <canvas id="game"></canvas>
    <div id="message"></div>
    <div id="controls-hint">Arrows to move / SPACE to shoot</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 640;
canvas.height = 500;

let player, bullets, enemyBullets, invaders, shields, particles, stars;
let score, lives, level, gameState, animFrame, moveTimer, moveInterval, moveDir;
let bestScore = parseInt(localStorage.getItem('invadersBest') || '0');
document.getElementById('best').textContent = bestScore;

const PLAYER_W = 40, PLAYER_H = 24;
const INV_W = 30, INV_H = 22, INV_COLS = 11, INV_ROWS = 5;
const INV_PAD_X = 8, INV_PAD_Y = 8;

const keys = {};

function init() {
    score = 0; lives = 3; level = 1;
    gameState = 'playing';
    document.getElementById('message').textContent = '';
    particles = [];
    createStars();
    setupLevel();
}

function createStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: 0.1 + Math.random() * 0.4,
            bright: Math.random()
        });
    }
}

function setupLevel() {
    player = { x: canvas.width / 2 - PLAYER_W / 2, y: canvas.height - 50, cooldown: 0 };
    bullets = [];
    enemyBullets = [];
    particles = [];
    moveDir = 1;
    moveInterval = Math.max(8, 30 - level * 3);
    moveTimer = 0;

    invaders = [];
    const offsetX = (canvas.width - INV_COLS * (INV_W + INV_PAD_X)) / 2;
    for (let r = 0; r < INV_ROWS; r++) {
        for (let c = 0; c < INV_COLS; c++) {
            invaders.push({
                x: offsetX + c * (INV_W + INV_PAD_X),
                y: 50 + r * (INV_H + INV_PAD_Y),
                row: r, alive: true,
                points: (INV_ROWS - r) * 10,
                type: r < 1 ? 2 : r < 3 ? 1 : 0
            });
        }
    }

    // Shields
    shields = [];
    const shieldPositions = [100, 230, 360, 490];
    for (const sx of shieldPositions) {
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 5; c++) {
                if (r === 2 && (c === 1 || c === 2 || c === 3)) continue; // Arch
                shields.push({ x: sx + c * 8, y: canvas.height - 120 + r * 8, w: 8, h: 8, hp: 3 });
            }
        }
    }
    updateUI();
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            dx: (Math.random() - 0.5) * 8,
            dy: (Math.random() - 0.5) * 8,
            life: 20 + Math.random() * 15,
            color, size: 1 + Math.random() * 3
        });
    }
}

function update() {
    animFrame = (animFrame || 0) + 1;

    // Stars
    for (const s of stars) {
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    }

    // Player movement
    if (keys['ArrowLeft'] || keys['a']) player.x -= 5;
    if (keys['ArrowRight'] || keys['d']) player.x += 5;
    player.x = Math.max(0, Math.min(canvas.width - PLAYER_W, player.x));
    if (player.cooldown > 0) player.cooldown--;

    // Shooting
    if ((keys[' '] || keys['ArrowUp']) && player.cooldown <= 0) {
        bullets.push({ x: player.x + PLAYER_W / 2, y: player.y, dy: -7 });
        player.cooldown = 15;
    }

    // Move bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y += bullets[i].dy;
        if (bullets[i].y < 0) bullets.splice(i, 1);
    }

    // Move enemy bullets
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].y += enemyBullets[i].dy;
        if (enemyBullets[i].y > canvas.height) { enemyBullets.splice(i, 1); continue; }

        // Hit player
        const b = enemyBullets[i];
        if (b && b.x > player.x && b.x < player.x + PLAYER_W && b.y > player.y && b.y < player.y + PLAYER_H) {
            enemyBullets.splice(i, 1);
            spawnParticles(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#00FF41', 20);
            lives--;
            updateUI();
            if (lives <= 0) {
                gameState = 'gameover';
                if (score > bestScore) { bestScore = score; localStorage.setItem('invadersBest', bestScore.toString()); document.getElementById('best').textContent = bestScore; }
            }
            continue;
        }

        // Hit shields
        if (b) {
            for (let s = shields.length - 1; s >= 0; s--) {
                const sh = shields[s];
                if (b.x > sh.x && b.x < sh.x + sh.w && b.y > sh.y && b.y < sh.y + sh.h) {
                    sh.hp--;
                    if (sh.hp <= 0) shields.splice(s, 1);
                    enemyBullets.splice(i, 1);
                    break;
                }
            }
        }
    }

    // Move invaders
    moveTimer++;
    if (moveTimer >= moveInterval) {
        moveTimer = 0;
        let hitEdge = false;
        for (const inv of invaders) {
            if (!inv.alive) continue;
            if ((inv.x + INV_W + moveDir * 8 > canvas.width - 10) || (inv.x + moveDir * 8 < 10)) {
                hitEdge = true;
                break;
            }
        }
        if (hitEdge) {
            moveDir = -moveDir;
            for (const inv of invaders) {
                if (inv.alive) inv.y += 12;
            }
            if (moveInterval > 2) moveInterval--;
        } else {
            for (const inv of invaders) {
                if (inv.alive) inv.x += moveDir * 8;
            }
        }

        // Enemy shooting
        const alive = invaders.filter(i => i.alive);
        if (alive.length > 0) {
            const shooters = [];
            for (const inv of alive) {
                const below = alive.some(other => other !== inv && other.x === inv.x && other.y > inv.y);
                if (!below) shooters.push(inv);
            }
            if (shooters.length > 0 && Math.random() < 0.4 + level * 0.05) {
                const shooter = shooters[Math.floor(Math.random() * shooters.length)];
                enemyBullets.push({ x: shooter.x + INV_W / 2, y: shooter.y + INV_H, dy: 3 + level * 0.3 });
            }
        }
    }

    // Bullet-invader collision
    for (let b = bullets.length - 1; b >= 0; b--) {
        const bullet = bullets[b];
        let hit = false;
        for (const inv of invaders) {
            if (!inv.alive) continue;
            if (bullet.x > inv.x && bullet.x < inv.x + INV_W && bullet.y > inv.y && bullet.y < inv.y + INV_H) {
                inv.alive = false;
                score += inv.points;
                hit = true;
                spawnParticles(inv.x + INV_W / 2, inv.y + INV_H / 2, inv.type === 2 ? '#FF0055' : inv.type === 1 ? '#00BBFF' : '#00FF41', 15);
                updateUI();

                // Speed up
                const aliveCount = invaders.filter(i => i.alive).length;
                if (aliveCount > 0) {
                    moveInterval = Math.max(1, Math.floor(30 * (aliveCount / (INV_COLS * INV_ROWS))));
                }
                break;
            }
        }
        if (hit) { bullets.splice(b, 1); continue; }

        // Bullet-shield collision
        for (let s = shields.length - 1; s >= 0; s--) {
            const sh = shields[s];
            if (bullet.x > sh.x && bullet.x < sh.x + sh.w && bullet.y > sh.y && bullet.y < sh.y + sh.h) {
                sh.hp--;
                if (sh.hp <= 0) shields.splice(s, 1);
                bullets.splice(b, 1);
                hit = true;
                break;
            }
        }
    }

    // Check if invaders reached bottom
    for (const inv of invaders) {
        if (inv.alive && inv.y + INV_H >= player.y) {
            gameState = 'gameover';
            if (score > bestScore) { bestScore = score; localStorage.setItem('invadersBest', bestScore.toString()); document.getElementById('best').textContent = bestScore; }
            return;
        }
    }

    // Win check
    if (invaders.every(i => !i.alive)) {
        gameState = 'win';
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        p.dy += 0.15;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawInvader(x, y, type, frame) {
    const f = Math.floor(animFrame / 15) % 2;
    ctx.save();
    if (type === 0) {
        // Basic invader - squid
        ctx.fillStyle = '#00FF41';
        ctx.fillRect(x + 10, y + 2, 10, 4);
        ctx.fillRect(x + 6, y + 6, 18, 4);
        ctx.fillRect(x + 4, y + 10, 22, 4);
        ctx.fillRect(x + 2, y + 14, 26, 4);
        if (f === 0) {
            ctx.fillRect(x + 4, y + 18, 4, 4);
            ctx.fillRect(x + 22, y + 18, 4, 4);
        } else {
            ctx.fillRect(x + 8, y + 18, 4, 4);
            ctx.fillRect(x + 18, y + 18, 4, 4);
        }
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 10, y + 10, 4, 4);
        ctx.fillRect(x + 18, y + 10, 4, 4);
    } else if (type === 1) {
        // Crab invader
        ctx.fillStyle = '#00BBFF';
        ctx.fillRect(x + 8, y + 2, 14, 4);
        ctx.fillRect(x + 4, y + 6, 22, 4);
        ctx.fillRect(x + 2, y + 10, 26, 4);
        ctx.fillRect(x + 6, y + 14, 18, 4);
        if (f === 0) {
            ctx.fillRect(x + 2, y + 14, 4, 6);
            ctx.fillRect(x + 24, y + 14, 4, 6);
        } else {
            ctx.fillRect(x, y + 10, 4, 6);
            ctx.fillRect(x + 26, y + 10, 4, 6);
        }
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 8, y + 10, 4, 4);
        ctx.fillRect(x + 18, y + 10, 4, 4);
    } else {
        // Octopus (top row, most points)
        ctx.fillStyle = '#FF0055';
        ctx.fillRect(x + 12, y, 6, 4);
        ctx.fillRect(x + 8, y + 4, 14, 4);
        ctx.fillRect(x + 4, y + 8, 22, 4);
        ctx.fillRect(x + 2, y + 12, 26, 4);
        ctx.fillRect(x + 4, y + 16, 22, 4);
        if (f === 0) {
            ctx.fillRect(x + 6, y + 16, 4, 6);
            ctx.fillRect(x + 14, y + 16, 4, 6);
            ctx.fillRect(x + 20, y + 16, 4, 6);
        } else {
            ctx.fillRect(x + 4, y + 16, 6, 6);
            ctx.fillRect(x + 20, y + 16, 6, 6);
        }
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 10, y + 8, 3, 4);
        ctx.fillRect(x + 17, y + 8, 3, 4);
    }
    ctx.restore();
}

function drawPlayer() {
    ctx.fillStyle = '#00FF41';
    ctx.shadowColor = '#00FF41';
    ctx.shadowBlur = 8;
    // Ship body
    ctx.beginPath();
    ctx.moveTo(player.x + PLAYER_W / 2, player.y);
    ctx.lineTo(player.x + PLAYER_W, player.y + PLAYER_H);
    ctx.lineTo(player.x, player.y + PLAYER_H);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#88FFAA';
    ctx.beginPath();
    ctx.arc(player.x + PLAYER_W / 2, player.y + 10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Thruster flame
    const flicker = Math.random() * 4;
    ctx.fillStyle = `hsl(${30 + flicker * 5}, 100%, ${60 + flicker * 5}%)`;
    ctx.beginPath();
    ctx.moveTo(player.x + PLAYER_W / 2 - 6, player.y + PLAYER_H);
    ctx.lineTo(player.x + PLAYER_W / 2, player.y + PLAYER_H + 6 + flicker);
    ctx.lineTo(player.x + PLAYER_W / 2 + 6, player.y + PLAYER_H);
    ctx.fill();
}

function draw() {
    ctx.fillStyle = '#000011';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stars
    for (const s of stars) {
        const twinkle = Math.sin(animFrame * 0.05 + s.bright * 10) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255,255,255,${twinkle * (s.size / 2)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    }

    // Shields
    for (const sh of shields) {
        const alpha = sh.hp / 3;
        ctx.fillStyle = `rgba(0, 255, 100, ${0.3 + alpha * 0.7})`;
        ctx.fillRect(sh.x, sh.y, sh.w, sh.h);
    }

    // Invaders
    for (const inv of invaders) {
        if (inv.alive) drawInvader(inv.x, inv.y, inv.type);
    }

    // Player
    if (gameState !== 'gameover') drawPlayer();

    // Bullets
    ctx.shadowColor = '#FFFF00';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#FFFF00';
    for (const b of bullets) {
        ctx.fillRect(b.x - 1.5, b.y, 3, 10);
    }
    ctx.shadowBlur = 0;

    // Enemy bullets
    ctx.fillStyle = '#FF4444';
    ctx.shadowColor = '#FF4444';
    ctx.shadowBlur = 4;
    for (const b of enemyBullets) {
        ctx.fillRect(b.x - 1.5, b.y, 3, 8);
    }
    ctx.shadowBlur = 0;

    // Particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 35;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / 35), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Overlays
    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FF0055';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
    } else if (gameState === 'win') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00FF41';
        ctx.font = 'bold 42px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('WAVE CLEARED!', canvas.width / 2, canvas.height / 2);
    }
}

function gameLoop() {
    if (gameState === 'playing') update();
    draw();

    const msgEl = document.getElementById('message');
    if (gameState === 'gameover') {
        msgEl.textContent = 'GAME OVER! SPACE to restart';
        msgEl.style.color = '#FF0055';
    } else if (gameState === 'win') {
        msgEl.textContent = 'SPACE for next wave!';
        msgEl.style.color = '#00FF41';
    } else {
        msgEl.textContent = '';
    }

    requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
    if (e.key === ' ') {
        if (gameState === 'gameover') init();
        else if (gameState === 'win') { level++; setupLevel(); gameState = 'playing'; }
    }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Touch controls
let touchX = null;
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchX = e.touches[0].clientX;
    // Auto-shoot on touch
    if (gameState === 'playing' && player.cooldown <= 0) {
        bullets.push({ x: player.x + PLAYER_W / 2, y: player.y, dy: -7 });
        player.cooldown = 15;
    }
    if (gameState === 'gameover') init();
    if (gameState === 'win') { level++; setupLevel(); gameState = 'playing'; }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (touchX !== null) {
        const dx = e.touches[0].clientX - touchX;
        player.x += dx * 1.5;
        player.x = Math.max(0, Math.min(canvas.width - PLAYER_W, player.x));
        touchX = e.touches[0].clientX;
    }
    // Auto-shoot while moving
    if (gameState === 'playing' && player.cooldown <= 0) {
        bullets.push({ x: player.x + PLAYER_W / 2, y: player.y, dy: -7 });
        player.cooldown = 15;
    }
}, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; });

init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
